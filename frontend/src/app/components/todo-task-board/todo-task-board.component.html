<div class="board-wrapper">
  <div class="toast-container" *ngIf="currentToast" [ngClass]="currentToast.type">
    <span class="icon">{{ currentToast.type === 'success' ? '✓' : '✕' }}</span>
    {{ currentToast.message }}
  </div>

  <header class="main-header">
    <div class="info">
      <h1>To Do Task Board</h1>
      <p>Total Tasks : {{ tasks.length }}</p>
    </div>
    <button class="primary-btn" (click)="openCreateModal()">
      <span>+</span> Create Task
    </button>
  </header>

  <hr class="section-divider">

  <div class="grid">
    <section class="column" *ngFor="let col of columns">
      <div class="column-header">
        <div class="header-title">
          <span class="indicator" [style.background]="col.color"></span>
          <h2>{{ col.label }}</h2>
          <span class="pill">{{ getTasksByStatus(col.value).length }}</span>
        </div>
      </div>

      <div class="drop-zone">
        <article class="card" *ngFor="let task of getTasksByStatus(col.value)">
          <div class="card-body">
            <div class="card-header">
  <h3>{{ task.title }}</h3>
  <div class="icon-group" style="display: flex; gap: 8px;">
    <button class="edit-btn" (click)="openEditModal(task)" style="color: #3b82f6; background: #dbeafe; border: none; padding: 4px; border-radius: 4px; cursor: pointer; display: flex;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
    </button>
    <button class="delete-btn" (click)="delete(task.id)" style="color: #ef4444; background: #fee2e2; border: none; padding: 4px; border-radius: 4px; cursor: pointer; display: flex;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18m-2 0v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6m3 0V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>
    </button>
  </div>
</div>
            <p>{{ task.description }}</p>
          </div>
          <div class="card-footer">
<div class="actions">
  <button *ngIf="task.status === 0" (click)="changeStatus(task.id, 1)" class="btn-action blue">
    Start Work
  </button>
  
  <button *ngIf="task.status === 1" (click)="changeStatus(task.id, 2)" class="btn-action green">
    Complete
  </button>
  
  <button *ngIf="task.status === 2" (click)="reopen(task.id)" class="btn-action gray">
    Reopen
  </button>
</div>
          </div>
        </article>
      </div>
    </section>
  </div>

  <div class="modal-overlay" *ngIf="showModal" (click)="showModal = false">
    <div class="modal-content" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <h2>New Task Details</h2>
        <button class="close-btn" (click)="showModal = false">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Task Title</label>
          <input type="text" [(ngModel)]="newTask.title" placeholder="e.g., Update API Endpoints">
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea [(ngModel)]="newTask.description" rows="4" placeholder="Briefly describe the requirements..."></textarea>
        </div>
      </div>
<div class="modal-footer">
  <button class="btn-secondary" (click)="showModal = false">
    Cancel
  </button>

  <button class="btn-save" (click)="handleSave()">
    {{ isEditMode ? 'Update Task' : 'Create Task' }}
  </button>
</div>
  </div>
</div>
